<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- NOTE: Per-route SEO (description, keywords, robots, canonical, Open Graph,
       Twitter cards, page-specific JSON-LD) is owned by the <SEO> component
       (react-helmet-async) and baked into each prerendered page at build time.
       Only globally-constant tags live here, to avoid duplicate/conflicting tags
       (e.g. two <link rel="canonical">) in the prerendered output. The <title>
       below is a fallback for the raw app shell; Helmet replaces it in place. -->
  <title>ShipOS — Social Media Scheduling & Management Tool for Everyone</title>
  <meta name="description" content="ShipOS is the all-in-one social media scheduling & management tool. Write once, schedule, and publish across X, LinkedIn, Instagram, TikTok, Threads, Facebook, Bluesky, Pinterest & YouTube — with a Content Studio, Slideshow Studio, bulk scheduling, a visual calendar, and analytics." />
  <meta name="keywords" content="social media scheduling tool, social media management software, schedule social media posts, social media scheduler, social media content creator, bulk social media scheduling, social media calendar, cross-platform social media posting, X scheduler, LinkedIn scheduler, Instagram scheduler, TikTok scheduler, Threads scheduler, social media analytics, content studio, ShipOS" />
  <meta name="author" content="ShipOS" />
  <meta name="application-name" content="ShipOS" />
  <meta name="theme-color" content="#FF6154" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ShipOS" />
  <meta property="og:url" content="https://www.myshipos.com" />
  <meta property="og:title" content="ShipOS — Social Media Scheduling & Management Tool for Everyone" />
  <meta property="og:description" content="ShipOS is the all-in-one social media scheduling & management tool. Write once, schedule, and publish across X, LinkedIn, Instagram, TikTok, Threads, Facebook, Bluesky, Pinterest & YouTube — with a Content Studio, Slideshow Studio, bulk scheduling, a visual calendar, and analytics." />
  <meta property="og:image" content="https://www.myshipos.com/og-image-v2.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="ShipOS — social media command center" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@ship_os" />
  <meta name="twitter:creator" content="@ship_os" />
  <meta name="twitter:title" content="ShipOS — Social Media Scheduling & Management Tool for Everyone" />
  <meta name="twitter:description" content="ShipOS is the all-in-one social media scheduling & management tool. Write once, schedule, and publish across X, LinkedIn, Instagram, TikTok, Threads, Facebook, Bluesky, Pinterest & YouTube — with a Content Studio, Slideshow Studio, bulk scheduling, a visual calendar, and analytics." />
  <meta name="twitter:image" content="https://www.myshipos.com/og-image-v2.png" />
  <meta name="twitter:image:alt" content="ShipOS preview" />

  <!-- Search-engine ownership verification -->
  <meta name="tiktok-developers-site-verification" content="qT56rjtPT8h3hiicbeh7gN95wG0xKyrA" />
  <!-- TODO: paste your Google Search Console token, then uncomment:
  <meta name="google-site-verification" content="YOUR_GOOGLE_VERIFICATION_TOKEN" /> -->
  <!-- TODO: paste your Bing Webmaster Tools token, then uncomment:
  <meta name="msvalidate.01" content="YOUR_BING_VERIFICATION_TOKEN" /> -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/png" href="/logo-icon.png" />
  <link rel="apple-touch-icon" href="/logo-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Baseline organization + website structured data; per-page graphs are added at runtime. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://www.myshipos.com/#organization",
        "name": "ShipOS",
        "url": "https://www.myshipos.com",
        "logo": "https://www.myshipos.com/logo-black.png",
        "sameAs": [
          "https://twitter.com/ship_os",
          "https://x.com/ship_os",
          "https://linkedin.com/company/shipos",
          "https://instagram.com/myshipos"
        ]
      },
      {
        "@type": "WebSite",
        "@id": "https://www.myshipos.com/#website",
        "url": "https://www.myshipos.com",
        "name": "ShipOS",
        "publisher": { "@id": "https://www.myshipos.com/#organization" },
        "inLanguage": "en"
      }
    ]
  }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <!-- Display + text fonts for Slideshow Studio slide text (varied weights, incl. light sans) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Caveat:wght@500;700&family=Dancing+Script:wght@600;700&family=Inter:wght@300;400;500;600&family=Lato:wght@300;400;700&family=Merriweather:wght@400;700&family=Montserrat:wght@300;500;700;800;900&family=Nunito:wght@300;400;700&family=Open+Sans:wght@300;400;600&family=Oswald:wght@400;600&family=Pacifico&family=Playfair+Display:wght@500;700&family=Poppins:wght@300;500;700;800;900&family=Raleway:wght@300;400;600&family=Roboto:wght@300;400;500&family=Source+Sans+3:wght@300;400;600&family=Work+Sans:wght@300;400;600&family=Syne:wght@500;700;800&family=Space+Grotesk:wght@400;700&family=Bricolage+Grotesque:wght@400;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Righteous&family=Unbounded:wght@500;800&family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Permanent+Marker&family=Kalam:wght@400;700&family=Patrick+Hand&family=Gochi+Hand&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
